<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body style="font-family: Arial; max-width: 600px; margin: auto;">

<h1 style="text-align:center;">📝 Quiz</h1>
<h2 id="timer" style="text-align:center; color:rgb(0, 38, 255);">⏳ 60</h2>

<form action="/submit" method="post">

    {% for q in questions %}
        {% set q_index = loop.index0 %}

        <div style="background:#f5f5f5; padding:15px; margin-bottom:15px; border-radius:10px;">
            
            <p><b>{{ q.question }}</b></p>

            {% for option in q.options %}
                <label>
                    <input type="radio" name="q{{ q_index }}" value="{{ option }}">
                    {{ option }}
                </label><br>
            {% endfor %}

        </div>
    {% endfor %}

    <div style="text-align:center;">
        <button type="submit" style="padding:10px 20px; font-size:16px;">
            Nộp bài
        </button>
    </div>

</form>
<script>
    let timeLeft = 60; // 60 giây
    const timer = document.getElementById("timer");

    const countdown = setInterval(() => {
        timeLeft--;
        timer.innerText = "⏳ " + timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Hết giờ!");
            document.querySelector("form").submit();
        }
    }, 1000);
    
</script>
</body>
</html>
